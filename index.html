<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="//fonts.googleapis.com/css?family=Droid+Sans"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="//fonts.googleapis.com/css?family=Droid+Sans+Mono"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="css/materialize.min.css"
      media="screen,projection"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-fork-ribbon-css/0.2.3/gh-fork-ribbon.min.css"
    />
    <link rel="stylesheet" type="text/css" href="css/page.css" />
    <link rel="stylesheet" type="text/css" href="css/codemirror.css" />
    <script type="text/javascript" src="js/codemirror.js"></script>
    <script type="text/javascript" src="js/gas.js"></script>
    <title>Online RISC-V Assembler</title>
  </head>
  <body>
    <div class="page-shell">
      <div class="container" id="content">
        <header class="hero-panel">
          <div>
            <h1>Ensamblador de RISC-V</h1>
          </div>
          <label class="control-field control-field-wide">
            <span>Flags adicionales</span>
            <input
              id="archCustomFlags"
              type="text"
              placeholder="e.g. -g --gdwarf-5"
              autocomplete="off"
              oninput="updateAssemblerPreview()"
            />
          </label>
        </header>
        <div class="workspace-grid">
          <section class="panel editor-panel">
            <form>
              <div class="input-field editor-field">
                <textarea id="sourceCodeBox">
.global _start
.text
_start:
    li      sp, 0x10000
    j       .
</textarea
                >
              </div>
            </form>
          </section>
        </div>
        <div class="action-row">
          <div class="action-copy">
            <strong>Build current workspace</strong>
            <span
              >O usa <kbd>Ctrl</kbd>/<kbd>Cmd</kbd> + <kbd>Enter</kbd> para
              compilar.</span
            >
          </div>
          <a class="btn build-btn" onClick="triggerBuild()">Build</a>
        </div>
        <div class="container panel build-panel" id="building">
          <p>Please wait while building</p>
          <div class="progress">
            <div class="indeterminate"></div>
          </div>
        </div>
        <div class="results-grid">
          <pre
            class="code code-res"
          ><label>Console</label><code id="output">Waiting for build</code></pre>
          <pre
            class="code code-res compact-result"
          ><label>Code<BR/>Hex Dump</label><button type="button" class="result-copy" onClick="copyResult('binaryBox', this)">Copiar</button><code id="binaryBox">Waiting for build</code></pre>
          <pre
            class="code code-res wide-result"
          ><label>Objdump Code<BR/>Disassembly</label><code id="objDumpBox">Waiting for build</code></pre>
        </div>
      </div>
    </div>

    <!--JavaScript at end of body for optimized loading-->
    <link
      rel="preload"
      href="js/as-new.wasm"
      as="fetch"
      type="application/wasm"
      crossorigin="anonymous"
    />
    <script data-main="js/app" src="js/require.js" async></script>
    <script type="text/javascript" src="js/materialize.min.js" async></script>
    <script
      src="https://code.jquery.com/jquery-3.6.0.slim.min.js"
      integrity="sha256-u7e5khyithlIdTpu22PHhENmPcRdFiHRjhAuHcs05RI="
      crossorigin="anonymous"
    ></script>
    <script>
      $(document).ready(() => {
        $('i[rel="pre"]').replaceWith(function () {
          return $("<pre><code>" + $(this).html() + "</code></pre>");
        });
        var pres = document.querySelectorAll("pre,kbd,blockquote");
        for (var i = 0; i < pres.length; i++) {
          pres[i].addEventListener(
            "dblclick",
            function () {
              var selection = getSelection();
              var range = document.createRange();
              range.selectNodeContents(this);
              selection.removeAllRanges();
              selection.addRange(range);
            },
            false,
          );
        }
        $("#content").show();
        window.editor = CodeMirror.fromTextArea(
          document.getElementById("sourceCodeBox"),
          {
            lineNumbers: true,
            theme: "dracula",
            mode: { name: "gas", architecture: "riscv" },
          },
        );
      });
    </script>
  </body>
</html>
