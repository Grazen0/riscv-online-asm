<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="css/codemirror.css" />
    <link rel="stylesheet" type="text/css" href="css/page.css" />
    <script type="text/javascript" src="js/codemirror.js"></script>
    <script type="text/javascript" src="js/gas.js"></script>
    <title>Ensamblador RISC-V en línea</title>
  </head>
  <body>
    <div class="shell">
      <header>
        <h1>Ensamblador de RISC-V</h1>
        <div class="header-controls">
          <label class="toggle">
            <span>Extensión C</span>
            <input type="checkbox" id="extC" checked />
          </label>
          <input
            id="archCustomFlags"
            type="text"
            placeholder="Flags adicionales"
          />
          <button class="build-btn" onclick="triggerBuild()">Compilar</button>
        </div>
      </header>

      <div class="workspace">
        <div class="editor-wrap">
          <textarea id="sourceCodeBox"></textarea>
        </div>

        <div class="result-panel">
          <div class="result-header">
            <span>Hex Dump</span>
            <button
              class="copy-btn"
              disabled
              onclick="copyResult('binaryBox', this)"
            >
              Copiar
            </button>
          </div>
          <pre
            class="result-body"
          ><code id="binaryBox">Esperando compilación</code></pre>
        </div>
      </div>

      <div class="shortcut-hint">
        <kbd>Ctrl</kbd>+<kbd>Enter</kbd> para compilar
      </div>

      <div class="results">
        <div class="result-panel">
          <div class="result-header">
            <span>Consola</span>
          </div>
          <pre
            class="result-body"
          ><code id="output">Esperando compilación</code></pre>
        </div>
        <div class="result-panel">
          <div class="result-header">
            <span>Desensamblado</span>
          </div>
          <pre
            class="result-body"
          ><code id="objDumpBox">Esperando compilación</code></pre>
        </div>
      </div>
    </div>

    <link
      rel="preload"
      href="js/as-new.wasm"
      as="fetch"
      type="application/wasm"
      crossorigin="anonymous"
    />
    <script src="js/riscv32-unknown-none-elf-as.js" defer></script>
    <script src="js/riscv32-unknown-none-elf-ld.js" defer></script>
    <script src="js/riscv32-unknown-none-elf-objcopy.js" defer></script>
    <script src="js/riscv32-unknown-none-elf-objdump.js" defer></script>
    <script src="js/main.js" defer></script>
    <script>
      const STORAGE_KEY = "riscv-asm-code";
      const DEFAULT_CODE = `
.global _start
_start:
`.trim();
      const savedCode = localStorage.getItem(STORAGE_KEY);

      document.getElementById("sourceCodeBox").value =
        savedCode ?? DEFAULT_CODE;

      window.editor = CodeMirror.fromTextArea(
        document.getElementById("sourceCodeBox"),
        {
          lineNumbers: true,
          mode: { name: "gas", architecture: "riscv" },
        },
      );

      if (savedCode !== null) {
        window.editor.setValue(savedCode);
      }

      const extC = document.getElementById("extC");
      const savedExtC = localStorage.getItem("riscv-asm-extc");
      if (savedExtC !== null) {
        extC.checked = savedExtC === "true";
      }
      extC.addEventListener("change", () => {
        localStorage.setItem("riscv-asm-extc", extC.checked);
      });

      window.editor.on("change", () => {
        localStorage.setItem(STORAGE_KEY, window.editor.getValue());
      });
    </script>
  </body>
</html>
